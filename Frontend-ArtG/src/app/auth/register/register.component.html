<section class="auth-page">
  <div class="auth-wrap">

    <div class="auth-header">
      <span class="auth-eyebrow">Galerie d'Art</span>
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-sub">100 coins offerts à l'inscription</p>
    </div>

    <div class="auth-card">

      @if (successMsg()) {
        <div class="auth-alert auth-alert-success">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          {{ successMsg() }}
        </div>
      }
      @if (errorMsg()) {
        <div class="auth-alert auth-alert-error">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
          </svg>
          {{ errorMsg() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate class="auth-form">

        <div class="auth-field">
          <label class="auth-label" for="name">Nom</label>
          <input
            id="name" name="name" type="text"
            [(ngModel)]="form.name" required
            placeholder="Votre nom"
            class="auth-input"
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="email">Email</label>
          <input
            id="email" name="email" type="email"
            [(ngModel)]="form.email" required
            placeholder="vous@exemple.com"
            class="auth-input"
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Mot de passe</label>
          <input
            id="password" name="password" type="password"
            [(ngModel)]="form.password" required minlength="6"
            placeholder="Minimum 6 caractères"
            class="auth-input"
          />
        </div>

        <button type="submit" [disabled]="loading() || f.invalid" class="auth-submit">
          @if (loading()) {
            <span class="spinner"></span> Inscription...
          } @else {
            Créer mon compte
          }
        </button>

      </form>

      <p class="auth-switch">
        Déjà inscrit ?
        <a routerLink="/login" class="auth-switch-link">Se connecter</a>
      </p>

    </div>

    <p class="wallet-notice">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      Votre wallet démarrera avec 100 coins
    </p>

  </div>
</section>
